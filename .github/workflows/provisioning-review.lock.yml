name: "Azure .NET Provisioning SDK PR Review"
on:
  check_run:
    types:
    - completed
  pull_request_target:
    paths:
    - sdk/**/Azure.Provisioning.*/**
    types:
    - opened
    - reopened
    - synchronize
  workflow_dispatch:
    inputs:
      aw_context:
        default: ""
        description: "Agent caller context (used internally by Agentic Workflows)."
        required: false
        type: string
      pr_number:
        description: Pull request number to review
        required: true
        type: string

permissions: {}

concurrency: provisioning-review-${{ github.event.pull_request.number || github.event.check_run.pull_requests[0].number || github.event.inputs.pr_number }}

run-name: "Azure .NET Provisioning SDK PR Review"

