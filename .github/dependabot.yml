version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/eng/packages/**"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      exclude:
        # Allow immediate updates of self-owned packages
        - "@azure-tools/*"
        - "@autorest/*"
        - "@azure/*"
        - "@microsoft.azure/*"
        - "@typespec/*"
        - "oav"
    ignore:
      # Updated manually to align with minimum supported Node version
      - dependency-name: "@types/node"
    groups:
      typespec:
        patterns:
          - "*typespec*"
      eslint:
        patterns:
          - "*eslint*"
    versioning-strategy: increase-if-necessary
