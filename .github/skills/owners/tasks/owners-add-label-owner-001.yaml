id: owners-add-label-owner-001
name: Add Service Owner to Label
description: |
  Test that the skill adds a user as a service owner of a label.
tags:
  - basic
inputs:
  prompt: "Add @serviceuser as a service owner of the %Storage label in azure-sdk-for-python"
expected:
  output_contains:
    - "serviceuser"
    - "Storage"
  outcomes:
    - type: tool_called
      tool_name: azsdk_engsys_codeowner_add_label_owner
  behavior:
    max_tool_calls: 5
    max_response_time_ms: 30000
