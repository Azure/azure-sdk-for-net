id: owners-add-package-label-001
name: Add Package Label
description: |
  Test that the skill adds a new label to a package with correct arguments.
tags:
  - basic
inputs:
  prompt: "Add Key Vault as label to azure-keyvault-keys in azure-sdk-for-python"
expected:
  output_contains:
    - "Key Vault"
    - "azure-keyvault-keys"
    - "azure-sdk-for-python"
  outcomes:
    - type: tool_called
      tool_name: azsdk_engsys_codeowner_add_package_label
  behavior:
    max_tool_calls: 5
    max_response_time_ms: 30000
graders:
  - type: text
    name: correct_entities
    config:
      contains:
        - "Key Vault"
        - "azure-keyvault-keys"
        - "azure-sdk-for-python"
      not_contains:
        - "cannot help"
        - "not supported"
