name: codeowners-manager-eval
description: Evaluation suite for the codeowners-manager skill.
skill: codeowners-manager
version: '1.0'
config:
  model: gpt-4o
  executor: mock
  trials_per_task: 1
  timeout_seconds: 300
  parallel: true
metrics:
  - name: task_completion
    weight: 0.7
    threshold: 0.8
    description: Did the skill complete trigger and anti-trigger checks?
  - name: efficiency
    weight: 0.3
    threshold: 0.7
    description: Did the skill stay within behavior limits?
tasks:
  - "tasks/*.yaml"
