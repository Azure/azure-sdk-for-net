name: sdk-release-eval
description: Evaluation suite for the sdk-release skill
type: capability

environment: azsdk-mcp

tags:
  area: azsdk-common-sdk-release
  priority: p0

config:
  runs: 1
  timeout: 300
  model: claude-opus-4.6
  executor: copilot-sdk

stimuli:
  - name: release-basic-001
    prompt: "I want to release my Azure Event Hubs Python SDK package."
    graders:
      - type: output-contains
        config:
          substring: "release"
      - type: tool-calls
        config:
          required:
            - name: azsdk_release_sdk

  - name: release-trigger-001
    prompt: "The readiness check passed. Go ahead and trigger the release pipeline for @azure/event-hubs JavaScript SDK."
    graders:
      - type: output-contains
        config:
          substring: "release"
      - type: output-contains
        config:
          substring: "pipeline"
      - type: output-contains
        config:
          substring: "approve"
    constraints:
      expect_tools: ["azsdk_release_sdk"]

  - name: release-readiness-001
    prompt: "Check if azure-messaging-eventhubs is ready for release in Java."
    graders:
      - type: output-contains
        config:
          substring: "ready"
      - type: tool-calls
        config:
          required:
            - name: azsdk_release_sdk

  - name: release-negative-001
    prompt: "I need to validate my CODEOWNERS file for the Python SDK repo."
    graders:
      - type: output-contains
        config:
          substring: "CODEOWNERS"

  - name: basic-trigger
    prompt: "I need to release a new version of my Azure SDK package. Walk me through the process."
    graders:
      - type: output-contains
        config:
          substring: "release"
    constraints:
      expect_skills: ["sdk-release"]

  - name: anti-trigger
    prompt: "How do I write unit tests for my Azure SDK client?"
    graders:
      - type: output-not-contains
        config:
          substring: "release process"
      - type: output-not-contains
        config:
          substring: "publish package"
