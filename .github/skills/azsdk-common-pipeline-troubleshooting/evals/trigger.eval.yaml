name: azsdk-common-pipeline-troubleshooting-trigger-eval
description: Trigger and anti-trigger tests for the azsdk-common-pipeline-troubleshooting skill
type: capability

environment: azsdk-mcp-mock

tags:
  area: azsdk-common-pipeline-troubleshooting
  type: ci-gate

config:
  runs: 1
  timeout: "5m"
  model: claude-opus-4.6
  executor: copilot-sdk

scoring:
  threshold: 0.8

stimuli:
  # Should trigger
  - name: trigger-my-ci-pipeline-is-failing
    prompt: "my Azure SDK CI pipeline is failing, can you help troubleshoot?"
    graders:
      - type: skill-invocation
        config:
          required: ["azsdk-common-pipeline-troubleshooting"]
  - name: trigger-debug-pipeline-build-error
    prompt: "debug my SDK generation pipeline build error"
    graders:
      - type: skill-invocation
        config:
          required: ["azsdk-common-pipeline-troubleshooting"]
  - name: trigger-pipeline-troubleshooting-help
    prompt: "pipeline troubleshooting help"
    graders:
      - type: skill-invocation
        config:
          required: ["azsdk-common-pipeline-troubleshooting"]
  - name: trigger-fix-failing-sdk-pipeline
    prompt: "fix my failing Azure SDK generation pipeline"
    graders:
      - type: skill-invocation
        config:
          required: ["azsdk-common-pipeline-troubleshooting"]
  - name: trigger-ci-build-broke-after-my-change
    prompt: "the SDK CI build broke after my change, help me troubleshoot the pipeline"
    graders:
      - type: skill-invocation
        config:
          required: ["azsdk-common-pipeline-troubleshooting"]

  # Should NOT trigger
  - name: anti-trigger-write-a-typespec-definition
    prompt: "write a TypeSpec definition"
    graders:
      - type: skill-invocation
        config:
          disallowed: ["azsdk-common-pipeline-troubleshooting"]
  - name: anti-trigger-create-a-new-skill
    prompt: "create a new skill"
    graders:
      - type: skill-invocation
        config:
          disallowed: ["azsdk-common-pipeline-troubleshooting"]
  - name: anti-trigger-optimize-markdown-tokens
    prompt: "optimize markdown tokens"
    graders:
      - type: skill-invocation
        config:
          disallowed: ["azsdk-common-pipeline-troubleshooting"]
  - name: anti-trigger-how-do-i-release-an-sdk-package
    prompt: "how do I release an SDK package"
    graders:
      - type: skill-invocation
        config:
          disallowed: ["azsdk-common-pipeline-troubleshooting"]
  - name: anti-trigger-resolve-apiview-feedback
    prompt: "resolve APIView feedback"
    graders:
      - type: skill-invocation
        config:
          disallowed: ["azsdk-common-pipeline-troubleshooting"]
