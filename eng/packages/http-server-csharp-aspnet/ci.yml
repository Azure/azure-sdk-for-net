trigger:
  branches:
    include:
      - main
  paths:
    include:
      - eng/packages/http-server-csharp-aspnet
pr:
  branches:
    include:
      - main
      - feature/*
      - hotfix/*
      - release/*
  paths:
    include:
      - eng/packages/http-server-csharp-aspnet

parameters:
  - name: UseTypeSpecNext
    displayName: "Use TypeSpec Next"
    type: boolean
    default: false
  - name: ShouldPublish
    displayName: "Publish packages"
    type: boolean
    default: false
  - name: PublishPublic
    displayName: "Publish to npmjs.org"
    type: boolean
    default: false
  - name: PublishNugetPackages
    displayName: "Publish NuGet package artifacts"
    type: boolean
    default: false

variables:
  - template: /eng/pipelines/templates/variables/image.yml
  - template: /eng/pipelines/templates/variables/globals.yml

extends:
  template: /eng/common/pipelines/templates/archetype-typespec-emitter.yml
  parameters:
    InitializationSteps:
      - template: /eng/pipelines/templates/steps/install-dotnet.yml
    EmitterPackageJsonOutputPath: eng/azure-typespec-http-server-csharp-aspnet-emitter-package.json
    EmitterPackagePath: eng/packages/http-server-csharp-aspnet
    BuildPrereleaseVersion: true
    UseTypeSpecNext: ${{ parameters.UseTypeSpecNext }}
    ${{ if eq(variables['System.TeamProject'], 'internal') }}:
      ${{ if eq(variables['Build.Reason'], 'Manual') }}:
        ShouldPublish: ${{ parameters.ShouldPublish }}
        HasNugetPackages: ${{ parameters.PublishNugetPackages }}
        ${{ if startswith(variables['Build.SourceBranch'], 'refs/pull/') }}:
          PublishPublic: false
          PublishDependsOnTest: false
        ${{ else }}:
           PublishPublic: ${{ parameters.PublishPublic }}
           PublishDependsOnTest: ${{ parameters.PublishPublic }}
      ${{ else }}:
        ShouldPublish: false
        PublishPublic: false
        HasNugetPackages: false
