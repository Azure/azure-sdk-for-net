# Reusable orchestrator for the eval CI. Three stages:
#   Prepare - BuildMcp + generate-eval-matrix run in parallel (build the MCP server(s);
#             glob eval files into a fan-out matrix).
#   Eval    - eval-shard fans out one job per shard from the Prepare matrix.
#   Summary - merges every shard's JUnit into one rollup and gates.
#
# The consuming repo supplies a thin entrypoint (trigger + params + extends this).

parameters:
  - name: vallyRoot
    # The single dir each shard runs `vally eval` from (where .vally.yaml lives) and the
    # anchor the matrix's `-e` paths are relative to. Defaults to the Vally project.
    type: string
    default: tools/azsdk-cli/Azure.Sdk.Tools.Vally
  - name: evalGlobs
    # File globs that select the *.eval.yaml files under vallyRoot (forward-slashed,
    # supports * ? **). Empty = collect-stimuli.js uses its built-in default.
    type: object
    default: []
  - name: shardBy
    type: string
    default: file
    values:
      - file
      - area
  - name: useCustomMcp
    # false (default): build the standard azure-sdk-tools .NET MCP (Mock + Cli) via the
    # shared eng/common step, which clones azure-sdk-tools automatically when the pipeline
    # runs outside it. true: the consuming repo supplies its own MCP build/startup at
    # eng/common/pipelines/templates/steps/eval-mcp-setup.yml (non-.NET servers, NPM-installed, etc.).
    type: boolean
    default: false
  - name: azureServiceConnection
    # Set for the live tier so shards run inside AzureCLI@2 (real DevOps). Empty = script.
    type: string
    default: ''
  - name: shardTimeoutInMinutes
    # LLM-driven shards can hang; cap well under the default agent slot.
    type: number
    default: 20
  - name: maxParallel
    # Concurrent shard legs. Lower for the live tier (long, real-DevOps legs).
    type: number
    default: 10
  - name: testRunTitle
    type: string
    default: 'Vally tool-scenario evals (mock vertical)'
  - name: failOnFailedTests
    type: boolean
    default: false
  - name: Use1ESOfficial
    # Official template on the internal project (full SDL), Unofficial elsewhere. The
    # 1es-redirect template picks the right one; consumers rarely need to override this.
    type: boolean
    default: true

extends:
  template: /eng/pipelines/templates/stages/1es-redirect.yml
  parameters:
    Use1ESOfficial: ${{ parameters.Use1ESOfficial }}
    stages:
      - stage: Prepare
        displayName: 'Build MCP'
        jobs:
          - job: BuildMcp
            displayName: 'Build + publish MCP server(s)'
            pool:
              name: $(LINUXPOOL)
              image: $(LINUXVMIMAGE)
              os: linux
            # 1ES publishes artifacts via templateContext.outputs, not the `publish` shortcut.
            templateContext:
              outputs:
                - output: pipelineArtifact
                  displayName: 'Publish MCP server artifact'
                  artifactName: mcp-servers
                  targetPath: $(Build.SourcesDirectory)/artifacts/mcp
            steps:
              - ${{ if parameters.useCustomMcp }}:
                  # Consuming repo supplies its own MCP build/startup (non-.NET servers, an
                  # NPM-installed live server, etc.). It must publish each server under
                  # artifacts/mcp/<name> so the shards re-stage it at the expected path.
                  - template: /eng/common/pipelines/templates/steps/eval-mcp-setup.yml
              - ${{ else }}:
                  # Default: build the azure-sdk-tools Mock + Cli .NET MCP servers (clones
                  # azure-sdk-tools automatically when the pipeline runs outside it).
                  - template: /eng/common/pipelines/templates/steps/eval-build-mcp.yml

          # Glob eval files into the fan-out matrix (parallel with BuildMcp). The Eval stage
          # reads it cross-stage and fans out eval-shard.yml.
          - template: /eng/common/pipelines/templates/jobs/generate-eval-matrix.yml
            parameters:
              vallyRoot: ${{ parameters.vallyRoot }}
              evalGlobs: ${{ parameters.evalGlobs }}
              shardBy: ${{ parameters.shardBy }}

      - stage: Eval
        displayName: 'Run eval shards'
        dependsOn: Prepare
        jobs:
          - template: /eng/common/pipelines/templates/jobs/eval-shard.yml
            parameters:
              vallyRoot: ${{ parameters.vallyRoot }}
              azureServiceConnection: ${{ parameters.azureServiceConnection }}
              shardTimeoutInMinutes: ${{ parameters.shardTimeoutInMinutes }}
              maxParallel: ${{ parameters.maxParallel }}

      - stage: Summary
        displayName: 'Summarize results'
        dependsOn: Eval
        condition: always()
        jobs:
          - job: Summarize
            displayName: 'Publish + gate rollup'
            pool:
              name: $(LINUXPOOL)
              image: $(LINUXVMIMAGE)
              os: linux
            steps:
              - template: /eng/common/pipelines/templates/steps/eval-summarize.yml
                parameters:
                  testRunTitle: ${{ parameters.testRunTitle }}
                  failOnFailedTests: ${{ parameters.failOnFailedTests }}
