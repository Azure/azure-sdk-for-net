# Reusable orchestrator for the Vally eval CI. Two stages (D8):
#   Eval    - BuildMcp + Detect run in parallel, then RunShard fans out one job per
#             shard from the Detect matrix. An optional custom-MCP build job hook (D6)
#             lets a consuming repo build an extra MCP alongside the default set.
#   Summary - depends on Eval; merges every shard's JUnit into one rollup.
#
# The consuming repo supplies a thin entrypoint (trigger + params + extends this).
# No variable group is named here — secrets come from the DevOps-linked group by
# variable name (D5).

parameters:
  - name: vallyRoot
    type: string
    default: tools/azsdk-cli/Azure.Sdk.Tools.Vally
  - name: scriptDir
    type: string
    default: eng/common/scripts/eval
  - name: skillEvalDir
    type: string
    default: eng/skill-eval
  - name: evalRoot
    # Repo-specific eval root. Defaults to the Vally project's evals.
    type: string
    default: $(Build.SourcesDirectory)/tools/azsdk-cli/Azure.Sdk.Tools.Vally
  - name: commonEvalRoot
    # Optional shared eval root (synced via eng/common). Empty = skip.
    type: string
    default: ''
  - name: patterns
    # Optional list of forward-slashed eval globs (per root). Empty = collect-stimuli.js
    # uses its built-in default (the Vally mock vertical).
    type: object
    default: []
  - name: shardBy
    type: string
    default: file
    values:
      - file
      - area
  - name: mcpArtifact
    type: string
    default: mcp-servers
  - name: mcpStageRoot
    # Common parent the built MCP servers are published from and re-staged into.
    type: string
    default: artifacts/mcp
  - name: mcpBuilds
    # List of { project, outputPath } MCP servers to build once and share with shards.
    type: object
    default:
      - project: tools/azsdk-cli/Azure.Sdk.Tools.Mock
        outputPath: artifacts/mcp/mock
  - name: azureServiceConnection
    # Set for the live tier so shards run inside AzureCLI@2 (real DevOps). Empty = script.
    type: string
    default: ''
  - name: threshold
    type: string
    default: '0.8'
  - name: nodeVersion
    type: string
    default: 22.x
  - name: githubTokenVariable
    type: string
    default: azuresdk-copilot-github-pat
  - name: maxParallel
    type: number
    default: 10
  - name: shardTimeoutInMinutes
    # LLM-driven shards can hang; cap well under the default agent slot.
    type: number
    default: 20
  - name: testRunTitle
    type: string
    default: 'Vally tool-scenario evals (mock vertical)'
  - name: failOnFailedTests
    type: boolean
    default: false
  # Custom MCP build hook (D6): a jobList a consuming repo can pass to build a live
  # MCP server in the Eval stage. Empty by default — the mock vertical needs nothing.
  - name: customMcpBuildJobs
    type: jobList
    default: []

stages:
  - stage: Eval
    displayName: 'Build MCP + run eval shards'
    jobs:
      - job: BuildMcp
        displayName: 'Build + publish MCP server(s)'
        pool:
          name: $(LINUXPOOL)
          image: $(LINUXVMIMAGE)
          os: linux
        steps:
          - template: /eng/common/pipelines/templates/steps/vally-build-mcp.yml
            parameters:
              mcpBuilds: ${{ parameters.mcpBuilds }}
              stageRoot: ${{ parameters.mcpStageRoot }}
              artifactName: ${{ parameters.mcpArtifact }}

      - job: Detect
        displayName: 'Glob eval files -> matrix'
        pool:
          name: $(LINUXPOOL)
          image: $(LINUXVMIMAGE)
          os: linux
        steps:
          - template: /eng/common/pipelines/templates/steps/vally-collect-stimuli.yml
            parameters:
              evalRoot: ${{ parameters.evalRoot }}
              commonEvalRoot: ${{ parameters.commonEvalRoot }}
              patterns: ${{ parameters.patterns }}
              shardBy: ${{ parameters.shardBy }}
              scriptDir: ${{ parameters.scriptDir }}
              outputVariableName: matrix
              stepName: detect
              nodeVersion: ${{ parameters.nodeVersion }}

      # Optional consumer-supplied jobs (e.g. build a live MCP). No-op when empty.
      - ${{ each job in parameters.customMcpBuildJobs }}:
        - ${{ job }}

      - job: RunShard
        displayName: 'Eval'
        dependsOn:
          - BuildMcp
          - Detect
        pool:
          name: $(LINUXPOOL)
          image: $(LINUXVMIMAGE)
          os: linux
        # continueOnError lets a single red shard finish without aborting the others —
        # the pass/fail rollup happens in Summary.
        continueOnError: true
        timeoutInMinutes: ${{ parameters.shardTimeoutInMinutes }}
        strategy:
          matrix: $[ dependencies.Detect.outputs['detect.matrix'] ]
          maxParallel: ${{ parameters.maxParallel }}
        steps:
          - template: /eng/common/pipelines/templates/steps/vally-run-shard.yml
            parameters:
              vallyRoot: ${{ parameters.vallyRoot }}
              scriptDir: ${{ parameters.scriptDir }}
              skillEvalDir: ${{ parameters.skillEvalDir }}
              mcpArtifact: ${{ parameters.mcpArtifact }}
              mcpStageRoot: ${{ parameters.mcpStageRoot }}
              azureServiceConnection: ${{ parameters.azureServiceConnection }}
              threshold: ${{ parameters.threshold }}
              nodeVersion: ${{ parameters.nodeVersion }}
              githubTokenVariable: ${{ parameters.githubTokenVariable }}

  - stage: Summary
    displayName: 'Summarize results'
    dependsOn: Eval
    condition: always()
    jobs:
      - job: Summarize
        displayName: 'Publish + gate rollup'
        pool:
          name: $(LINUXPOOL)
          image: $(LINUXVMIMAGE)
          os: linux
        steps:
          - template: /eng/common/pipelines/templates/steps/vally-summarize.yml
            parameters:
              scriptDir: ${{ parameters.scriptDir }}
              nodeVersion: ${{ parameters.nodeVersion }}
              testRunTitle: ${{ parameters.testRunTitle }}
              failOnFailedTests: ${{ parameters.failOnFailedTests }}
