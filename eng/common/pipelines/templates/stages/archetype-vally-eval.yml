# Reusable orchestrator for the eval CI. Three stages:
#   Prepare - BuildMcp + Detect run in parallel (build the MCP server(s); glob eval
#             files into a shard matrix).
#   Eval    - RunShard fans out one job per shard from the Prepare matrix.
#   Summary - merges every shard's JUnit into one rollup and gates.
#
# The consuming repo supplies a thin entrypoint (trigger + params + extends this).

parameters:
  - name: vallyRoot
    # The single dir each shard runs `vally eval` from (where .vally.yaml lives) and the
    # anchor the matrix's `-e` paths are relative to. Defaults to the Vally project.
    type: string
    default: tools/azsdk-cli/Azure.Sdk.Tools.Vally
  - name: evalScriptDir
    type: string
    default: eng/common/scripts/eval
  - name: skillEvalDir
    type: string
    default: eng/skill-eval
  - name: evalRoots
    # Dirs to glob for eval files (each absolute or relative to $(Build.SourcesDirectory)).
    # Empty = just vallyRoot. List several to collect evals scattered across folders.
    type: object
    default: []
  - name: evalGlobs
    # File globs that select the *.eval.yaml files *under* each evalRoots dir (the "which
    # files", vs evalRoots' "which dirs"). Forward-slashed, supports * ? **. Empty =
    # collect-stimuli.js uses its built-in default (the mock tool-scenario globs).
    type: object
    default: []
  - name: shardBy
    type: string
    default: file
    values:
      - file
      - area
  - name: mcpArtifact
    type: string
    default: mcp-servers
  - name: mcpStageRoot
    # Common parent the built MCP servers are published from and re-staged into.
    type: string
    default: artifacts/mcp
  - name: mcpBuilds
    # List of { project, outputPath } MCP servers to build once and share with shards.
    type: object
    default:
      - project: tools/azsdk-cli/Azure.Sdk.Tools.Mock
        outputPath: artifacts/mcp/mock
  - name: azureServiceConnection
    # Set for the live tier so shards run inside AzureCLI@2 (real DevOps). Empty = script.
    type: string
    default: ''
  - name: threshold
    type: string
    default: '0.8'
  - name: nodeVersion
    type: string
    default: 22.x
  - name: githubTokenVariable
    type: string
    default: azuresdk-copilot-github-pat
  - name: maxParallel
    type: number
    default: 10
  - name: shardTimeoutInMinutes
    # LLM-driven shards can hang; cap well under the default agent slot.
    type: number
    default: 20
  - name: testRunTitle
    type: string
    default: 'Vally tool-scenario evals (mock vertical)'
  - name: failOnFailedTests
    type: boolean
    default: false
  - name: Use1ESOfficial
    # Official template on the internal project (full SDL), Unofficial elsewhere. The
    # 1es-redirect template picks the right one; consumers rarely need to override this.
    type: boolean
    default: true

extends:
  template: /eng/pipelines/templates/stages/1es-redirect.yml
  parameters:
    Use1ESOfficial: ${{ parameters.Use1ESOfficial }}
    stages:
      - stage: Prepare
        displayName: 'Build MCP + detect shards'
        jobs:
          - job: BuildMcp
            displayName: 'Build + publish MCP server(s)'
            pool:
              name: $(LINUXPOOL)
              image: $(LINUXVMIMAGE)
              os: linux
            # 1ES publishes artifacts via templateContext.outputs, not the `publish` shortcut.
            templateContext:
              outputs:
                - output: pipelineArtifact
                  displayName: 'Publish MCP server artifact'
                  artifactName: ${{ parameters.mcpArtifact }}
                  targetPath: $(Build.SourcesDirectory)/${{ parameters.mcpStageRoot }}
            steps:
              - template: /eng/common/pipelines/templates/steps/vally-build-mcp.yml
                parameters:
                  mcpBuilds: ${{ parameters.mcpBuilds }}

          - job: Detect
            displayName: 'Glob eval files -> matrix'
            pool:
              name: $(LINUXPOOL)
              image: $(LINUXVMIMAGE)
              os: linux
            steps:
              - template: /eng/common/pipelines/templates/steps/vally-collect-stimuli.yml
                parameters:
                  evalRoots: ${{ parameters.evalRoots }}
                  pathBase: $(Build.SourcesDirectory)/${{ parameters.vallyRoot }}
                  evalGlobs: ${{ parameters.evalGlobs }}
                  shardBy: ${{ parameters.shardBy }}
                  scriptDir: ${{ parameters.evalScriptDir }}
                  outputVariableName: matrix
                  stepName: detect
                  nodeVersion: ${{ parameters.nodeVersion }}

      - stage: Eval
        displayName: 'Run eval shards'
        dependsOn: Prepare
        jobs:
          - job: RunShard
            displayName: 'Eval'
            pool:
              name: $(LINUXPOOL)
              image: $(LINUXVMIMAGE)
              os: linux
            # continueOnError lets a single red shard finish without aborting the others —
            # the pass/fail rollup happens in Summary.
            continueOnError: true
            timeoutInMinutes: ${{ parameters.shardTimeoutInMinutes }}
            strategy:
              matrix: $[ stageDependencies.Prepare.Detect.outputs['detect.matrix'] ]
              maxParallel: ${{ parameters.maxParallel }}
            # Per-leg artifacts (matrix injects $(shardName)). JUnit always; transcripts
            # only on a genuine failure. Both staged by the vally-run-shard.yml steps.
            templateContext:
              outputs:
                - output: pipelineArtifact
                  displayName: 'Publish $(shardName) JUnit'
                  artifactName: 'eval-result-$(shardName)'
                  targetPath: $(Build.ArtifactStagingDirectory)/junit
                  condition: always()
                - output: pipelineArtifact
                  displayName: 'Publish $(shardName) transcripts (on failure)'
                  artifactName: 'eval-debug-$(shardName)'
                  targetPath: $(Build.ArtifactStagingDirectory)/debug
                  condition: failed()
            steps:
              - template: /eng/common/pipelines/templates/steps/vally-run-shard.yml
                parameters:
                  vallyRoot: ${{ parameters.vallyRoot }}
                  scriptDir: ${{ parameters.evalScriptDir }}
                  skillEvalDir: ${{ parameters.skillEvalDir }}
                  mcpArtifact: ${{ parameters.mcpArtifact }}
                  mcpStageRoot: ${{ parameters.mcpStageRoot }}
                  azureServiceConnection: ${{ parameters.azureServiceConnection }}
                  threshold: ${{ parameters.threshold }}
                  nodeVersion: ${{ parameters.nodeVersion }}
                  githubTokenVariable: ${{ parameters.githubTokenVariable }}

      - stage: Summary
        displayName: 'Summarize results'
        dependsOn: Eval
        condition: always()
        jobs:
          - job: Summarize
            displayName: 'Publish + gate rollup'
            pool:
              name: $(LINUXPOOL)
              image: $(LINUXVMIMAGE)
              os: linux
            steps:
              - template: /eng/common/pipelines/templates/steps/vally-summarize.yml
                parameters:
                  scriptDir: ${{ parameters.evalScriptDir }}
                  nodeVersion: ${{ parameters.nodeVersion }}
                  testRunTitle: ${{ parameters.testRunTitle }}
                  failOnFailedTests: ${{ parameters.failOnFailedTests }}
