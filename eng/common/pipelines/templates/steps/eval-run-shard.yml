# Run one eval shard against the prebuilt MCP server(s), then publish its results.
# Used inside a job that defines `strategy: matrix` from the collect-stimuli output,
# so $(shardName) and $(evalArgs) are provided per shard. Pass/fail is decided by the
# eval VERDICT (invoke-eval-shard.js reads results.jsonl), not the `vally` exit code —
# Vally can exit 1 on a teardown timeout after a passing run, and that flake must not
# turn a green shard red.
#
# Only the two values an entrypoint actually varies are parameters (vallyRoot,
# evalInvokeTemplate). Everything else the shard needs is a fixed repo constant inlined
# below — the script dir (eng/common/scripts/eval), the MCP artifact name (mcp-servers)
# and its stage path (artifacts/mcp), and Node 22.x — so they're not plumbed as params no
# caller ever overrides.

parameters:
  - name: vallyRoot
    # The single dir the shard runs `vally eval` from (where .vally.yaml lives) and the
    # anchor the matrix's `-e` paths are relative to. The one path an entrypoint varies
    # (skill evals run from .github/skills), so it stays a threaded parameter.
    type: string
    default: tools/azsdk-cli/Azure.Sdk.Tools.Vally
  - name: evalInvokeTemplate
    # Path to the step template that actually runs `vally eval` for this shard. Defaults to
    # the hermetic plain-node runner; a pipeline overrides it to wrap the run at execution
    # time — the live tier's AzureCLI@2 (real DevOps auth), a chatbot start/stop, a custom
    # MCP startup. This is the single run-time customization hook, so the orchestrator owns
    # no service connection (the override does).
    type: string
    default: /eng/common/pipelines/templates/steps/eval-invoke.yml

steps:
  - checkout: self
    fetchDepth: 1

  - task: UseNode@1
    displayName: 'Use Node.js 22.x'
    inputs:
      version: 22.x

  # Point npm at the azure-sdk Azure Artifacts npm mirror. The 1ES Official managed
  # image blocks direct egress to registry.npmjs.org (npm ci fails EPERM/"rejected by
  # your operating system"), so packages must be restored through this allowlisted feed
  # (it proxies+caches public npm server-side). Auth uses the build's own credentials.
  - template: /eng/common/pipelines/templates/steps/create-authenticated-npmrc.yml
    parameters:
      npmrcPath: $(Build.SourcesDirectory)/.npmrc
      registryUrl: https://pkgs.dev.azure.com/azure-sdk/public/_packaging/azure-sdk-tools/npm/registry/

  # npm ci installs @microsoft/vally-cli AND its locked transitive @github/copilot-sdk
  # (the executor) into eng/common/scripts/eval/node_modules — no global install needed (D9).
  - script: npm ci --userconfig $(Build.SourcesDirectory)/.npmrc
    displayName: 'Install Vally CLI + copilot-sdk (pinned via lockfile)'
    workingDirectory: eng/common/scripts/eval

  - download: current
    artifact: mcp-servers
    displayName: 'Download Azure SDK Tools MCP server(s)'

  - script: |
      mkdir -p "$(Build.SourcesDirectory)/artifacts/mcp"
      cp -r "$(Pipeline.Workspace)/mcp-servers/." "$(Build.SourcesDirectory)/artifacts/mcp/"
    displayName: 'Stage MCP server(s) at expected path'

  # Clone the git fixtures THIS shard's evals reference. init-eval-git-fixtures.js scans
  # each eval's `environment.git` block for its (repo, ref) pairs and clones them into the
  # cache the fixtures expect — Vally won't do this itself ('git worktree add' needs the
  # source already on disk). We turn the matrix's `-e <file>` args into `--pattern <file>`
  # so the scan targets exactly the evals this shard runs (not a fixed default set), which
  # keeps custom/live/scattered suites correct and avoids cloning fixtures a shard never
  # uses. No-op for unit-only shards. set -f keeps the paths literal for the script.
  - script: |
      patterns=()
      set -f
      for tok in $EVAL_ARGS; do
        [ "$tok" = "-e" ] && continue
        patterns+=(--pattern "$tok")
      done
      set +f
      node "$(Build.SourcesDirectory)/eng/common/scripts/eval/init-eval-git-fixtures.js" \
        --eval-root "$(Build.SourcesDirectory)/${{ parameters.vallyRoot }}" \
        "${patterns[@]}"
    displayName: 'Prime eval git fixtures (scan + clone)'
    env:
      EVAL_ARGS: $(evalArgs)

  # Run the eval (gate on the VERDICT, not the `vally` exit code — see header comment).
  # The actual invocation is delegated to evalInvokeTemplate so a pipeline can wrap it at
  # execution time (live-tier AzureCLI@2 auth, chatbot start/stop, custom MCP startup)
  # without the shared orchestrator owning a service connection. Default = hermetic node.
  - template: ${{ parameters.evalInvokeTemplate }}
    parameters:
      vallyRoot: ${{ parameters.vallyRoot }}

  # Always stage just the JUnit (a few KB) — all the Summary stage consumes — so green
  # runs stay tiny. The host job publishes this dir as 'eval-result-$(shardName)' via 1ES
  # templateContext.outputs. Heavy LLM transcripts stage separately, only on failure.
  - script: |
      mkdir -p "$(Build.ArtifactStagingDirectory)/junit"
      find "$(Build.SourcesDirectory)/artifacts/vally-results/$(shardName)" -name '*.junit.xml' -exec cp {} "$(Build.ArtifactStagingDirectory)/junit/" \;
    displayName: 'Collect $(shardName) JUnit'
    condition: always()

  # On a GENUINE failure (shard exited non-zero — an eval fell below threshold), keep the
  # full Vally output for debugging: transcripts, results.jsonl, etc. Strip the JUnit from
  # this copy so the Summary download (which globs **/*.junit.xml) can't double-count. A
  # passing verdict that merely hit Vally's teardown timeout exits 0 and skips this step.
  # The host job publishes this dir as 'eval-debug-$(shardName)' on failure.
  - script: |
      src="$(Build.SourcesDirectory)/artifacts/vally-results/$(shardName)"
      dest="$(Build.ArtifactStagingDirectory)/debug"
      mkdir -p "$dest"
      if [ -d "$src" ]; then
        cp -r "$src/." "$dest/"
        find "$dest" -name '*.junit.xml' -delete
      fi
    displayName: 'Collect $(shardName) transcripts (on failure)'
    condition: failed()
