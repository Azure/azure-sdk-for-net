# Run one eval shard against the prebuilt MCP server(s), then publish its results.
# Used inside a job that defines `strategy: matrix` from the collect-stimuli output,
# so $(shardName) and $(evalArgs) are provided per shard. Pass/fail is decided by the
# eval VERDICT (invoke-eval-shard.js reads results.jsonl), not the `vally` exit code —
# Vally can exit 1 on a teardown timeout after a passing run, and that flake must not
# turn a green shard red.

parameters:
  - name: vallyRoot
    # The single dir the shard runs `vally eval` from (where .vally.yaml lives) and the
    # anchor the matrix's `-e` paths are relative to.
    type: string
    default: tools/azsdk-cli/Azure.Sdk.Tools.Vally
  - name: scriptDir
    type: string
    default: eng/common/scripts/eval
  - name: skillEvalDir
    # Where the pinned Vally CLI is installed from (npm ci against its lockfile).
    type: string
    default: eng/skill-eval
  - name: mcpArtifact
    type: string
    default: mcp-servers
  - name: mcpStageRoot
    # Relative to $(Build.SourcesDirectory); must match the path .vally.yaml expects.
    # The published artifact is re-staged here so the DLL subfolders (cli/, mock/) land
    # at the paths the eval environments resolve against.
    type: string
    default: artifacts/mcp
  - name: threshold
    type: string
    default: '0.8'
  - name: nodeVersion
    type: string
    default: 22.x
  - name: azureServiceConnection
    # When set, the eval runs inside an AzureCLI@2 task so the agent's MCP tools can
    # reach real Azure DevOps (the live tier). Empty = plain script (hermetic tiers).
    type: string
    default: ''
  - name: githubTokenVariable
    # Name of the secret variable (from the DevOps-linked group) the copilot-sdk
    # executor authenticates with. Passed by name so no group is hardcoded (D5).
    type: string
    default: azuresdk-copilot-github-pat

steps:
  - checkout: self
    fetchDepth: 1

  - task: UseNode@1
    displayName: 'Use Node.js ${{ parameters.nodeVersion }}'
    inputs:
      version: ${{ parameters.nodeVersion }}

  # npm ci installs @microsoft/vally-cli AND its locked transitive @github/copilot-sdk
  # (the executor) into eng/skill-eval/node_modules — no global install needed (D9).
  - script: npm ci
    displayName: 'Install Vally CLI + copilot-sdk (pinned via lockfile)'
    workingDirectory: ${{ parameters.skillEvalDir }}

  - download: current
    artifact: ${{ parameters.mcpArtifact }}
    displayName: 'Download MCP server(s)'

  - script: |
      mkdir -p "$(Build.SourcesDirectory)/${{ parameters.mcpStageRoot }}"
      cp -r "$(Pipeline.Workspace)/${{ parameters.mcpArtifact }}/." "$(Build.SourcesDirectory)/${{ parameters.mcpStageRoot }}/"
    displayName: 'Stage MCP server(s) at expected path'

  # Clone the git fixtures THIS shard's evals reference. init-eval-git-fixtures.js scans
  # each eval's `environment.git` block for its (repo, ref) pairs and clones them into the
  # cache the fixtures expect — Vally won't do this itself ('git worktree add' needs the
  # source already on disk). We turn the matrix's `-e <file>` args into `--pattern <file>`
  # so the scan targets exactly the evals this shard runs (not a fixed default set), which
  # keeps custom/live/scattered suites correct and avoids cloning fixtures a shard never
  # uses. No-op for unit-only shards. set -f keeps the paths literal for the script.
  - script: |
      patterns=()
      set -f
      for tok in $EVAL_ARGS; do
        [ "$tok" = "-e" ] && continue
        patterns+=(--pattern "$tok")
      done
      set +f
      node "$(Build.SourcesDirectory)/${{ parameters.scriptDir }}/init-eval-git-fixtures.js" \
        --eval-root "$(Build.SourcesDirectory)/${{ parameters.vallyRoot }}" \
        "${patterns[@]}"
    displayName: 'Prime eval git fixtures (scan + clone)'
    env:
      EVAL_ARGS: $(evalArgs)

  # Gate on the eval verdict, not the `vally` exit code (see header comment). The live
  # tier wraps the same command in AzureCLI@2 so the agent's MCP DevOps calls inherit the
  # service-connection identity; the hermetic tiers run it as a plain script.
  - ${{ if ne(parameters.azureServiceConnection, '') }}:
      - task: AzureCLI@2
        displayName: 'vally eval $(shardName)'
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          workingDirectory: ${{ parameters.vallyRoot }}
          inlineScript: |
            node "$(Build.SourcesDirectory)/${{ parameters.scriptDir }}/invoke-eval-shard.js" \
              --eval-args "$(evalArgs)" \
              --shard-name "$(shardName)" \
              --output-dir "$(Build.SourcesDirectory)/artifacts/vally-results/$(shardName)" \
              --skill-eval-prefix "$(Build.SourcesDirectory)/${{ parameters.skillEvalDir }}" \
              --threshold ${{ parameters.threshold }}
        env:
          GITHUB_TOKEN: $(${{ parameters.githubTokenVariable }})
  - ${{ else }}:
      - script: |
          node "$(Build.SourcesDirectory)/${{ parameters.scriptDir }}/invoke-eval-shard.js" \
            --eval-args "$(evalArgs)" \
            --shard-name "$(shardName)" \
            --output-dir "$(Build.SourcesDirectory)/artifacts/vally-results/$(shardName)" \
            --skill-eval-prefix "$(Build.SourcesDirectory)/${{ parameters.skillEvalDir }}" \
            --threshold ${{ parameters.threshold }}
        displayName: 'vally eval $(shardName)'
        workingDirectory: ${{ parameters.vallyRoot }}
        env:
          GITHUB_TOKEN: $(${{ parameters.githubTokenVariable }})

  # Always stage just the JUnit (a few KB) — all the Summary stage consumes — so green
  # runs stay tiny. The host job publishes this dir as 'eval-result-$(shardName)' via 1ES
  # templateContext.outputs. Heavy LLM transcripts stage separately, only on failure.
  - script: |
      mkdir -p "$(Build.ArtifactStagingDirectory)/junit"
      find "$(Build.SourcesDirectory)/artifacts/vally-results/$(shardName)" -name '*.junit.xml' -exec cp {} "$(Build.ArtifactStagingDirectory)/junit/" \;
    displayName: 'Collect $(shardName) JUnit'
    condition: always()

  # On a GENUINE failure (shard exited non-zero — an eval fell below threshold), keep the
  # full Vally output for debugging: transcripts, results.jsonl, etc. Strip the JUnit from
  # this copy so the Summary download (which globs **/*.junit.xml) can't double-count. A
  # passing verdict that merely hit Vally's teardown timeout exits 0 and skips this step.
  # The host job publishes this dir as 'eval-debug-$(shardName)' on failure.
  - script: |
      src="$(Build.SourcesDirectory)/artifacts/vally-results/$(shardName)"
      dest="$(Build.ArtifactStagingDirectory)/debug"
      mkdir -p "$dest"
      if [ -d "$src" ]; then
        cp -r "$src/." "$dest/"
        find "$dest" -name '*.junit.xml' -delete
      fi
    displayName: 'Collect $(shardName) transcripts (on failure)'
    condition: failed()
