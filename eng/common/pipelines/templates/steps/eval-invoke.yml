# Default (hermetic) invoke for one eval shard: runs `vally eval` via invoke-eval-shard.js.
# Swap point — a tier needing auth points evalInvokeTemplate at its own copy (see eval-invoke-live.yml).

parameters:
  - name: vallyRoot
    type: string
    default: tools/azsdk-cli/Azure.Sdk.Tools.Vally

steps:
  - script: |
      node "$(Build.SourcesDirectory)/eng/common/scripts/eval/invoke-eval-shard.js" \
        --eval-args "$(evalArgs)" \
        --shard-name "$(shardName)" \
        --output-dir "$(Build.SourcesDirectory)/artifacts/vally-results/$(shardName)" \
        --skill-eval-prefix "$(Build.SourcesDirectory)/eng/common/scripts/eval" \
        --threshold 0.8
    displayName: 'vally eval $(shardName)'
    workingDirectory: ${{ parameters.vallyRoot }}
    # copilot-sdk authenticates the model session via GITHUB_TOKEN; sourced from the linked eval variable group.
    env:
      GITHUB_TOKEN: $(azuresdk-copilot-github-pat)
