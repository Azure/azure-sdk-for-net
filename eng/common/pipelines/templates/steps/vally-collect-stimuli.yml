# Discover the eval files and emit the fan-out matrix the Eval stage shards over.
# Vally has no `list` command, so collect-stimuli.js globs the filesystem. It reads
# TWO sources (D7): the consuming repo's eval folder and an optional shared/common
# folder synced under eng/common — each file's shard args are computed against its
# own root. The matrix is published as an output variable: <stepName>.<outputVariable>.

parameters:
  - name: evalRoot
    # Repo-specific eval root (absolute or relative to $(Build.SourcesDirectory)).
    type: string
  - name: commonEvalRoot
    # Optional shared eval root synced via eng/common. Empty string = skip.
    type: string
    default: ''
  - name: shardBy
    type: string
    default: file
    values:
      - file
      - area
  - name: scriptDir
    type: string
    default: eng/common/scripts/eval
  - name: outputVariableName
    type: string
    default: matrix
  - name: stepName
    # The matrix consumer references dependencies.<job>.outputs['<stepName>.<outputVariableName>'].
    type: string
    default: detect
  - name: nodeVersion
    type: string
    default: 22.x

steps:
  - checkout: self
    fetchDepth: 1

  - task: UseNode@1
    displayName: 'Use Node.js ${{ parameters.nodeVersion }}'
    inputs:
      version: ${{ parameters.nodeVersion }}

  - script: |
      roots=(--eval-root "${{ parameters.evalRoot }}")
      if [ -n "${{ parameters.commonEvalRoot }}" ]; then
        roots+=(--eval-root "${{ parameters.commonEvalRoot }}")
      fi
      node "$(Build.SourcesDirectory)/${{ parameters.scriptDir }}/collect-stimuli.js" \
        "${roots[@]}" \
        --shard-by ${{ parameters.shardBy }} \
        --output-variable ${{ parameters.outputVariableName }}
    name: ${{ parameters.stepName }}
    displayName: 'Build fan-out matrix'
