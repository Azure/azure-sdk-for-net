parameters:
  ArtifactLocation: 'not-specified'
  PackageRepository: 'not-specified'
  PackageFilter: ''
  ReleaseSha: 'not-specified'
  RepoId: $(Build.Repository.Name)
  WorkingDirectory: ''
  ScriptDirectory: eng/common/scripts
  NpmConfigUserConfig: ''
  NpmConfigRegistry: ''
  AuthToken: $(azuresdk-github-pat)

steps:
- ${{ if eq(parameters.AuthToken, '') }}:
  - template: /eng/common/pipelines/templates/steps/login-to-github.yml
    parameters:
      TokenOwners:
        - ${{ split(parameters.RepoId, '/')[0] }}
      ScriptDirectory: ${{ parameters.ScriptDirectory }}

- task: PowerShell@2
  displayName: 'Verify Package Tags and Create Git Releases'
  inputs:
    filePath: ${{ parameters.ScriptDirectory }}/create-tags-and-git-release.ps1
    arguments: >
      -artifactLocation ${{ parameters.ArtifactLocation }}
      -packageRepository ${{ parameters.PackageRepository }}
      -packageFilter "${{ parameters.PackageFilter }}"
      -releaseSha ${{ parameters.ReleaseSha }}
      -repoId ${{ parameters.RepoId }}
      -workingDirectory '${{ parameters.WorkingDirectory }}'
    pwsh: true
  timeoutInMinutes: 5
  env:
    GH_TOKEN: ${{ coalesce(parameters.AuthToken, '$(GH_TOKEN)') }}
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
    ${{ if ne(parameters.NpmConfigUserConfig, '') }}:
      npm_config_userconfig: ${{ parameters.NpmConfigUserConfig }}
    ${{ if ne(parameters.NpmConfigRegistry, '') }}:
      npm_config_registry: ${{ parameters.NpmConfigRegistry }}
