# MCP setup for azure-sdk-tools' eval CI: builds the in-repo .NET MCP server(s) and publishes each
# under artifacts/mcp/<name> (the path BuildMcp ships as `mcp-servers`). The McpServer param selects
# the mock vs live tier via if/else. The BuildMcp job checks out `self`, so in azure-sdk-tools this
# template only builds. Other repos override mcpSetupTemplate to point at their own equivalent.
#
# Cross-repo use: when this runs OUTSIDE azure-sdk-tools, set `toolsRepo` to a repository-resource
# alias so the tools sources are side-checked-out before the build. The consuming pipeline declares
# the resource and passes toolsRepo (via the archetype) alongside mcpServer, e.g.:
#   resources:
#     repositories:
#       - repository: azure-sdk-tools
#         type: github
#         name: Azure/azure-sdk-tools
#         endpoint: <github service connection>
#   # ... extends archetype-eval.yml with: toolsRepo: azure-sdk-tools

parameters:
  - name: McpServer
    type: string
    default: mock
    values:
      - mock
      - live
  - name: toolsRepo
    # Repository-resource alias for azure-sdk-tools when building from outside the tools repo.
    # Blank (default) = current repo IS azure-sdk-tools, build from Build.SourcesDirectory.
    type: string
    default: ''

steps:
  # Outside azure-sdk-tools: side-check-out the tools sources so the build below can find azsdk-cli.
  - ${{ if parameters.toolsRepo }}:
    - checkout: ${{ parameters.toolsRepo }}
      path: s/azure-sdk-tools
      fetchDepth: 1

  # Builds this repo's server(s) under artifacts/mcp/<name>; other repos override mcpSetupTemplate.
  # workingDirectory switches to the side-checkout when toolsRepo is set (cross-repo build).
  - ${{ if eq(parameters.McpServer, 'live') }}:
    - script: |
        set -e
        dotnet build tools/azsdk-cli/Azure.Sdk.Tools.Cli -c Release -o "$(Build.SourcesDirectory)/artifacts/mcp/cli" --nologo
      displayName: 'Build MCP: Cli (live) server'
      ${{ if parameters.toolsRepo }}:
        workingDirectory: $(Build.SourcesDirectory)/azure-sdk-tools

  - ${{ else }}:
    - script: |
        set -e
        dotnet build tools/azsdk-cli/Azure.Sdk.Tools.Mock -c Release -o "$(Build.SourcesDirectory)/artifacts/mcp/mock" --nologo
      displayName: 'Build MCP: Mock server'
      ${{ if parameters.toolsRepo }}:
        workingDirectory: $(Build.SourcesDirectory)/azure-sdk-tools
