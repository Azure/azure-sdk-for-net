# Gather every shard's JUnit, merge it into one rollup, and surface it (Markdown
# build-summary + Tests tab). build-eval-summary.js emits ##vso[task.uploadsummary]
# so the rollup lands on the run's Summary tab directly.
#
# Phase 1 is report-only: failOnFailedTests=false makes red results visible without
# failing the build. Flip to true once the eval content is hardened.

parameters:
  # failOnFailedTests is the only knob a caller varies (the live tier sets it true to gate);
  # everything else this step needs is a fixed constant inlined below, not a parameter:
  # the glue dir (eng/common/scripts/eval), the downloaded-results path, the summary output
  # path, Node 22.x, and the test-run title.
  - name: failOnFailedTests
    type: boolean
    default: false

steps:
  - task: UseNode@1
    displayName: 'Use Node.js 22.x'
    inputs:
      version: 22.x

  # Pull every shard's JUnit into one folder. Match *.junit.xml directly and scope to
  # JUnit only, so stray XML (e.g. the mock DLL's .NET doc XML) can't slip in as a
  # fake shard. Each artifact keeps its own eval-result-<shard>/ subfolder, so the
  # summary can recover the shard name from the path.
  - task: DownloadPipelineArtifact@2
    displayName: 'Download all shard results'
    inputs:
      buildType: 'current'
      itemPattern: '**/*.junit.xml'
      targetPath: $(Pipeline.Workspace)/eval-results

  # Render the rollup straight to the run's Summary tab.
  - script: |
      node "$(Build.SourcesDirectory)/eng/common/scripts/eval/build-eval-summary.js" \
        --results-root "$(Pipeline.Workspace)/eval-results" \
        --output-path "$(Build.ArtifactStagingDirectory)/eval-summary.md"
    displayName: 'Render Markdown rollup (build summary)'
    condition: always()

  # Merge all shards into a single test run for the Tests tab.
  - task: PublishTestResults@2
    displayName: 'Publish eval rollup'
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '$(Pipeline.Workspace)/eval-results/**/*.junit.xml'
      mergeTestResults: true
      failTaskOnFailedTests: ${{ parameters.failOnFailedTests }}
      testRunTitle: 'Vally evals'
