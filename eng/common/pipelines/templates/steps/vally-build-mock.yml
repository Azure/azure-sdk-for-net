# Build the mock MCP server once and publish it as a pipeline artifact, so every
# eval shard downloads the prebuilt DLL instead of rebuilding it (the biggest speed
# win; also sidesteps the MSBuild boot race when shards run in parallel — #15947).
# Vally runs `dotnet <dll>`, not `dotnet run`, so a plain build output is enough.

parameters:
  - name: mockProject
    type: string
    default: tools/azsdk-cli/Azure.Sdk.Tools.Mock
  - name: outputPath
    # Relative to $(Build.SourcesDirectory). Must match the path .vally.yaml expects.
    type: string
    default: artifacts/mcp/mock
  - name: artifactName
    type: string
    default: mcp-mock

steps:
  - checkout: self
    fetchDepth: 1

  - script: |
      dotnet build ${{ parameters.mockProject }} -c Release -o ${{ parameters.outputPath }} --nologo
    displayName: 'Build mock MCP server'

  - publish: '$(Build.SourcesDirectory)/${{ parameters.outputPath }}'
    artifact: ${{ parameters.artifactName }}
    displayName: 'Publish mock DLL artifact'
