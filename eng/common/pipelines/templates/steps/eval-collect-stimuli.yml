# Discover the eval files and emit the fan-out matrix the Eval stage shards over.
# The eval CLI has no `list` command, so collect-stimuli.js globs the filesystem under a
# single eval root (`pathBase` — the dir each shard runs `vally eval` from) and anchors every
# emitted `-e` path to it so the paths resolve at run time. The matrix is published as an
# output variable: <stepName>.<outputVariable>.

parameters:
  - name: pathBase
    # The single eval root: the dir each shard runs `vally eval` from and the anchor for
    # the emitted `-e` paths. Globs and discovery are scoped to this one directory.
    type: string
    default: ''
  - name: evalGlobs
    # File globs selecting *.eval.yaml under the root (relative, forward-slashed, * ? **).
    # Empty = let collect-stimuli.js use its built-in default (the mock tool-scenario globs).
    type: object
    default: []

steps:
  - checkout: self
    fetchDepth: 1

  - task: UseNode@1
    displayName: 'Use Node.js 22.x'
    inputs:
      version: 22.x

  - script: |
      # EVAL_PATTERNS is a space-joined list passed via env so it survives as a real bash
      # var. set -f stops the shell glob-expanding the patterns' `*` before they reach the
      # script. The single eval root is pathBase (the dir each shard runs `vally eval` from).
      patterns=()
      if [ -n "$EVAL_PATTERNS" ]; then
        set -f
        for p in $EVAL_PATTERNS; do
          patterns+=(--pattern "$p")
        done
        set +f
      fi
      node "$(Build.SourcesDirectory)/eng/common/scripts/eval/collect-stimuli.js" \
        --eval-root "${{ parameters.pathBase }}" \
        --path-base "${{ parameters.pathBase }}" \
        "${patterns[@]}" \
        --output-variable matrix
    # Job name is fixed: the Eval stage reads this output at the hardcoded cross-stage path
    # generate_eval_matrix.outputs['detect.matrix'], so the step name and output var are
    # inlined constants, not parameters.
    name: detect
    displayName: 'Build fan-out matrix'
    env:
      EVAL_PATTERNS: ${{ join(' ', parameters.evalGlobs) }}
