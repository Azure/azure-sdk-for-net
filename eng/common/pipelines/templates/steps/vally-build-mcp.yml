# Build one or more MCP servers once so every eval shard downloads prebuilt DLLs instead
# of rebuilding them (the biggest speed win; also sidesteps the MSBuild boot race when
# shards run in parallel — #15947). Vally runs `dotnet <dll>`, not `dotnet run`, so a
# plain build output is enough.
#
# Each entry in `mcpBuilds` is built into its own subfolder under a common stage root; the
# host job publishes that whole tree as one artifact via 1ES `templateContext.outputs`,
# and each shard re-stages it at the same path, matching the relative DLL paths the various
# .vally.yaml environments expect:
#   - mock vertical : artifacts/mcp/mock  (azsdk-mock.dll)
#   - skills        : artifacts/mcp/cli + artifacts/mcp/mock
#   - live          : artifacts/mcp/cli  (azsdk.dll)

parameters:
  - name: mcpBuilds
    # List of { project, outputPath } — outputPath is relative to $(Build.SourcesDirectory)
    # and must sit under the stage root so it ships inside the published artifact.
    type: object
    default:
      - project: tools/azsdk-cli/Azure.Sdk.Tools.Mock
        outputPath: artifacts/mcp/mock

steps:
  - checkout: self
    fetchDepth: 1

  - ${{ each build in parameters.mcpBuilds }}:
      - script: |
          dotnet build ${{ build.project }} -c Release -o ${{ build.outputPath }} --nologo
        displayName: 'Build MCP: ${{ build.project }}'
