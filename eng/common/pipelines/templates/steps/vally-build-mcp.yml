# Default MCP build for the eval CI: build the azure-sdk-tools .NET MCP servers (Mock + Cli)
# once and publish them as one artifact every shard re-stages. This is the step the archetype
# runs when useCustomMcp=false. Repos whose evals drive a different MCP (non-.NET, an
# NPM-installed live server, etc.) set useCustomMcp=true and provide their own
# eng/common/pipelines/templates/steps/eval-mcp-setup.yml instead.
#
# The pipeline may run from azure-sdk-tools (the MCP source is already in `self`) OR from
# another repo (a spec/language repo) whose default checkout does NOT contain the MCP source.
# We detect which via Build.Repository.Name at run time and shallow-clone azure-sdk-tools to a
# temp path only when needed, so the same template works in every repo. (Build.Repository.Name
# is runtime-only, so a `checkout` step can't be conditioned on it — hence the script clone.)
#
# Output layout each .vally.yaml resolves against (the whole tree ships as one artifact and
# every shard re-stages it at the same path):
#   - artifacts/mcp/mock  (azsdk-mock.dll)  — hermetic mock vertical + skills
#   - artifacts/mcp/cli   (azsdk.dll)       — live tier + skills

parameters:
  - name: mcpStageRoot
    # Common parent the built servers are published from (relative to Build.SourcesDirectory).
    type: string
    default: artifacts/mcp
  - name: toolsRepoName
    # Build.Repository.Name value identifying the azure-sdk-tools checkout, so we skip the
    # clone when the pipeline already runs there. Matches a bare name or "<org>/<name>".
    type: string
    default: azure-sdk-tools
  - name: toolsRepoUrl
    # Cloned only when the pipeline runs outside azure-sdk-tools. Public repo, so anonymous.
    type: string
    default: https://github.com/Azure/azure-sdk-tools

steps:
  - checkout: self
    fetchDepth: 1

  # Resolve the azure-sdk-tools source dir: the current checkout when we already run there,
  # otherwise a shallow clone in the agent temp dir. Exposes it as $(mcpToolsDir).
  - script: |
      set -e
      repo="$(Build.Repository.Name)"
      toolsDir="$(Build.SourcesDirectory)"
      case "$repo" in
        ${{ parameters.toolsRepoName }}|*/${{ parameters.toolsRepoName }})
          echo "Running in $repo; building the MCP from the current checkout."
          ;;
        *)
          toolsDir="$(Agent.TempDirectory)/azure-sdk-tools"
          echo "Running in $repo; cloning azure-sdk-tools into $toolsDir for the MCP build."
          rm -rf "$toolsDir"
          git clone --depth 1 ${{ parameters.toolsRepoUrl }} "$toolsDir"
          ;;
      esac
      echo "##vso[task.setvariable variable=mcpToolsDir]$toolsDir"
    displayName: 'Resolve azure-sdk-tools source'

  - script: |
      set -e
      dotnet build "$(mcpToolsDir)/tools/azsdk-cli/Azure.Sdk.Tools.Mock" -c Release -o "$(Build.SourcesDirectory)/${{ parameters.mcpStageRoot }}/mock" --nologo
    displayName: 'Build MCP: Mock server'

  - script: |
      set -e
      dotnet build "$(mcpToolsDir)/tools/azsdk-cli/Azure.Sdk.Tools.Cli" -c Release -o "$(Build.SourcesDirectory)/${{ parameters.mcpStageRoot }}/cli" --nologo
    displayName: 'Build MCP: Cli server'
