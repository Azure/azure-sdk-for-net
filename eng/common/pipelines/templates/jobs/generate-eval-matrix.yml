# Globs the eval files into a fan-out matrix (output var detect.matrix). Runs in Prepare
# alongside BuildMcp; the Eval stage's RunShard job consumes it cross-stage and fans out
# one leg per shard.
# Eval-specific globber (collect-stimuli.js) rather than the package-oriented matrix scripts.

parameters:
  - name: vallyRoot
    type: string
    default: tools/azsdk-cli/Azure.Sdk.Tools.Vally
  - name: evalGlobs
    type: object
    default: []

jobs:
  # Job name is fixed: the Eval stage reads this matrix cross-stage at the hardcoded path
  # stageDependencies.Prepare.generate_eval_matrix.outputs['detect.matrix'], so the name
  # and the step's detect.matrix output are inlined constants rather than parameters.
  - job: generate_eval_matrix
    displayName: 'Glob eval files -> matrix'
    pool:
      name: $(LINUXPOOL)
      image: $(LINUXVMIMAGE)
      os: linux
    steps:
      - template: /eng/common/pipelines/templates/steps/eval-collect-stimuli.yml
        parameters:
          pathBase: $(Build.SourcesDirectory)/${{ parameters.vallyRoot }}
          evalGlobs: ${{ parameters.evalGlobs }}
