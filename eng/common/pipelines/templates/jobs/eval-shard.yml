# Fan-out shard job dispatched by generate-eval-matrix.yml. One leg per shard runs the
# evals from vallyRoot and publishes per-leg JUnit (always) + transcripts (on failure).

parameters:
  - name: Matrix
    # Cross-stage matrix from the Prepare generate job.
    type: string
    default: stageDependencies.Prepare.generate_eval_matrix.outputs['detect.matrix']
  - name: vallyRoot
    type: string
    default: tools/azsdk-cli/Azure.Sdk.Tools.Vally
  - name: evalInvokeTemplate
    # Path to the step template that runs `vally eval` for each shard. Threaded to
    # eval-run-shard.yml; defaults to the hermetic node runner, live overrides it.
    type: string
    default: /eng/common/pipelines/templates/steps/eval-invoke.yml
  - name: maxParallel
    type: number
    default: 10

jobs:
  - job: RunShard
    displayName: 'Eval'
    pool:
      name: $(LINUXPOOL)
      image: $(LINUXVMIMAGE)
      os: linux
    # continueOnError lets a single red shard finish without aborting the others —
    # the pass/fail rollup happens in Summary.
    continueOnError: true
    # shardTimeoutInMinutes is an entrypoint-declared variable (hermetic tiers 20, live 45)
    # rather than a parameter — each thin pipeline sets it in its own `variables` block.
    timeoutInMinutes: $(shardTimeoutInMinutes)
    strategy:
      matrix: $[ ${{ parameters.Matrix }} ]
      maxParallel: ${{ parameters.maxParallel }}
    # Per-leg artifacts (matrix injects $(shardName)). JUnit always; transcripts
    # only on a genuine failure. Both staged by the eval-run-shard.yml steps.
    templateContext:
      outputs:
        - output: pipelineArtifact
          displayName: 'Publish $(shardName) JUnit'
          artifactName: 'eval-result-$(shardName)'
          targetPath: $(Build.ArtifactStagingDirectory)/junit
          condition: always()
        - output: pipelineArtifact
          displayName: 'Publish $(shardName) transcripts (on failure)'
          artifactName: 'eval-debug-$(shardName)'
          targetPath: $(Build.ArtifactStagingDirectory)/debug
          condition: failed()
    steps:
      - template: /eng/common/pipelines/templates/steps/eval-run-shard.yml
        parameters:
          vallyRoot: ${{ parameters.vallyRoot }}
          evalInvokeTemplate: ${{ parameters.evalInvokeTemplate }}
