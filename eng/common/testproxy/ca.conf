# Configuration for the self-signed CA used to sign the localhost TLS certificate.
# Parameters are kept in sync with the original dotnet-devcert.crt so that
# dotnet dev-certs and other tooling recognises the certificate chain.

[req]
prompt                  = no
default_bits            = 2048
distinguished_name      = subject
x509_extensions         = x509_ext

[ subject ]
commonName              = Azure SDK

[x509_ext]
basicConstraints        = critical, CA:true
keyUsage                = critical, keyCertSign, cRLSign
subjectKeyIdentifier    = hash
