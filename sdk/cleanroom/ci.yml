# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
    - main
    - hotfix/*
    - release/*
  paths:
    include:
    - sdk/cleanroom
    - sdk/cleanroom/ci.yml
    - sdk/cleanroom/Azure.ResourceManager.CleanRoom

pr:
  branches:
    include:
    - main
    - feature/*
    - hotfix/*
    - release/*
  paths:
    include:
    - sdk/cleanroom
    - sdk/cleanroom/ci.yml
    - sdk/cleanroom/Azure.ResourceManager.CleanRoom

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    ServiceDirectory: cleanroom
    ArtifactName: packages
    Artifacts:
    - name: Azure.ResourceManager.CleanRoom
      safeName: AzureResourceManagerCleanRoom
