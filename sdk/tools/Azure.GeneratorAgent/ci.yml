# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
    - main
    - hotfix/*
    - release/*
  paths:
    include:
    - sdk/tools/Azure.GeneratorAgent/

pr:
  branches:
    include:
    - main
    - feature/*
    - release/*
    - hotfix/*
  paths:
    include:
    - sdk/tools/Azure.GeneratorAgent/

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    ServiceDirectory: tools/Azure.GeneratorAgent
    ArtifactName: packages
    Artifacts:
    - name: Azure.GeneratorAgent
      safeName: AzureGeneratorAgent
    MatrixConfigs:
    - Name: NET10_Only_Custom
      Matrix:
        Windows_NET10:
          Pool: env:WINDOWSPOOL
          OSVmImage: env:WINDOWSVMIMAGE
          TestTargetFramework: net10.0
      GenerateVMJobs: true