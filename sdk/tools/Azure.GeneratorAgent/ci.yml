# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
    - main
    - hotfix/*
    - release/*
  paths:
    include:
    - sdk/tools/Azure.GeneratorAgent/

pr:
  branches:
    include:
    - main
    - feature/*
    - release/*
    - hotfix/*
  paths:
    include:
    - sdk/tools/Azure.GeneratorAgent/

extends:
  template: /eng/common/pipelines/templates/archetype-typespec-emitter.yml
  parameters:
    InitializationSteps:
      - template: /eng/pipelines/templates/steps/install-dotnet.yml
    EmitterPackagePath: sdk/tools/Azure.GeneratorAgent
    TestMatrix:
      All:
        TestArguments: -UnitTests -Filter .NET
        SpectorName: "Azure.GeneratorAgent"