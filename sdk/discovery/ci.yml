# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
    - main
    - hotfix/*
    - release/*
  paths:
    include:
    - sdk/discovery
    - sdk/discovery/ci.yml
    - sdk/discovery/Azure.AI.Discovery

pr:
  branches:
    include:
    - main
    - feature/*
    - hotfix/*
    - release/*
  paths:
    include:
    - sdk/discovery
    - sdk/discovery/ci.yml
    - sdk/discovery/Azure.AI.Discovery

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    ServiceDirectory: discovery
    ArtifactName: packages
    Artifacts:
    - name: Azure.AI.Discovery
      safeName: AzureAIDiscovery
