kind: hosted
name: travel-agent-sample
protocols:
    - protocol: responses
      version: 1.0.0
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
    - name: AZURE_AI_OPENAI_ENDPOINT
      value: ${AZURE_AI_OPENAI_ENDPOINT}
    - name: OPTIMIZATION_LOCAL_DIR
      value: .agent_configs
    # OPTIMIZATION_CANDIDATE_ID is intentionally not set here. After running
    # `azd ai agent optimize` and `azd ai agent optimize apply --candidate <id>`,
    # set it on the deployed agent's environment to flip the agent to the
    # applied candidate, e.g.:
    #
    #   - name: OPTIMIZATION_CANDIDATE_ID
    #     value: cand_<your-candidate-id>

