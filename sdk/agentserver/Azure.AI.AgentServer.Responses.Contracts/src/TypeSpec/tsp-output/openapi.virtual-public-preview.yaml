openapi: 3.0.0
info:
  title: Microsoft Foundry
  version: virtual-public-preview
tags:
  - name: Responses
paths:
  /openai/v1/responses:
    post:
      operationId: createResponse_createResponseStream
      parameters: []
      description: Creates a model response. Creates a model response (streaming response).
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAI.Response'
            text/event-stream:
              schema:
                $ref: '#/components/schemas/OpenAI.CreateResponseStreamingResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      tags:
        - Responses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              anyOf:
                - type: object
                  properties:
                    metadata:
                      type: object
                      allOf:
                        - $ref: '#/components/schemas/OpenAI.Metadata'
                      nullable: true
                    top_logprobs:
                      type: integer
                      nullable: true
                    temperature:
                      type: number
                      nullable: true
                      default: 1
                    top_p:
                      type: number
                      nullable: true
                      default: 1
                    user:
                      type: string
                      description: |-
                        This field is being replaced by `safety_identifier` and `prompt_cache_key`. Use `prompt_cache_key` instead to maintain caching optimizations.
                          A stable identifier for your end-users.
                          Used to boost cache hit rates by better bucketing similar requests and  to help OpenAI detect and prevent abuse. [Learn more](/docs/guides/safety-best-practices#safety-identifiers).
                      deprecated: true
                    safety_identifier:
                      type: string
                      description: |-
                        A stable identifier used to help detect users of your application that may be violating OpenAI's usage policies.
                          The IDs should be a string that uniquely identifies each user. We recommend hashing their username or email address, in order to avoid sending us any identifying information. [Learn more](/docs/guides/safety-best-practices#safety-identifiers).
                    prompt_cache_key:
                      type: string
                      description: Used by OpenAI to cache responses for similar requests to optimize your cache hit rates. Replaces the `user` field. [Learn more](/docs/guides/prompt-caching).
                    service_tier:
                      $ref: '#/components/schemas/OpenAI.ServiceTier'
                    prompt_cache_retention:
                      type: string
                      enum:
                        - in-memory
                        - 24h
                      nullable: true
                    previous_response_id:
                      type: string
                      nullable: true
                    model:
                      type: string
                      description: The model deployment to use for the creation of this response.
                    reasoning:
                      type: object
                      allOf:
                        - $ref: '#/components/schemas/OpenAI.Reasoning'
                      nullable: true
                    background:
                      type: boolean
                      nullable: true
                    max_output_tokens:
                      type: integer
                      nullable: true
                    max_tool_calls:
                      type: integer
                      nullable: true
                    text:
                      $ref: '#/components/schemas/OpenAI.ResponseTextParam'
                    tools:
                      $ref: '#/components/schemas/OpenAI.ToolsArray'
                    tool_choice:
                      oneOf:
                        - $ref: '#/components/schemas/OpenAI.ToolChoiceOptions'
                        - $ref: '#/components/schemas/OpenAI.ToolChoiceParam'
                    prompt:
                      $ref: '#/components/schemas/OpenAI.Prompt'
                    truncation:
                      type: string
                      enum:
                        - auto
                        - disabled
                      nullable: true
                      default: disabled
                    input:
                      $ref: '#/components/schemas/OpenAI.InputParam'
                    include:
                      type: array
                      items:
                        $ref: '#/components/schemas/OpenAI.IncludeEnum'
                      nullable: true
                    parallel_tool_calls:
                      type: boolean
                      nullable: true
                      default: true
                    store:
                      type: boolean
                      nullable: true
                      default: true
                    instructions:
                      type: string
                      nullable: true
                    stream:
                      type: boolean
                      nullable: true
                    stream_options:
                      type: object
                      allOf:
                        - $ref: '#/components/schemas/OpenAI.ResponseStreamOptions'
                      nullable: true
                    conversation:
                      allOf:
                        - $ref: '#/components/schemas/OpenAI.ConversationParam'
                      nullable: true
                    context_management:
                      type: array
                      items:
                        $ref: '#/components/schemas/OpenAI.ContextManagementParam'
                      nullable: true
                      description: Context management configuration for this request.
                    agent:
                      allOf:
                        - $ref: '#/components/schemas/AgentReference'
                      description: |-
                        (Deprecated) Use agent_reference instead.
                        The agent to use for generating the response.
                    agent_reference:
                      allOf:
                        - $ref: '#/components/schemas/AgentReference'
                      description: The agent to use for generating the response.
                    structured_inputs:
                      type: object
                      additionalProperties: {}
                      description: The structured inputs to the response that can participate in prompt template substitution or tool argument bindings.
                    agent_session_id:
                      type: string
                      description: |-
                        Optional session identifier for sandbox affinity. Currently only relevant for hosted agents.
                        When provided, the request is routed to the same sandbox. When omitted, auto-derived from
                        conversation_id/prev_response_id or a new UUID is generated.
                - type: object
                  properties:
                    metadata:
                      type: object
                      allOf:
                        - $ref: '#/components/schemas/OpenAI.Metadata'
                      nullable: true
                    top_logprobs:
                      type: integer
                      nullable: true
                    temperature:
                      type: number
                      nullable: true
                      default: 1
                    top_p:
                      type: number
                      nullable: true
                      default: 1
                    user:
                      type: string
                      description: |-
                        This field is being replaced by `safety_identifier` and `prompt_cache_key`. Use `prompt_cache_key` instead to maintain caching optimizations.
                          A stable identifier for your end-users.
                          Used to boost cache hit rates by better bucketing similar requests and  to help OpenAI detect and prevent abuse. [Learn more](/docs/guides/safety-best-practices#safety-identifiers).
                      deprecated: true
                    safety_identifier:
                      type: string
                      description: |-
                        A stable identifier used to help detect users of your application that may be violating OpenAI's usage policies.
                          The IDs should be a string that uniquely identifies each user. We recommend hashing their username or email address, in order to avoid sending us any identifying information. [Learn more](/docs/guides/safety-best-practices#safety-identifiers).
                    prompt_cache_key:
                      type: string
                      description: Used by OpenAI to cache responses for similar requests to optimize your cache hit rates. Replaces the `user` field. [Learn more](/docs/guides/prompt-caching).
                    service_tier:
                      $ref: '#/components/schemas/OpenAI.ServiceTier'
                    prompt_cache_retention:
                      type: string
                      enum:
                        - in-memory
                        - 24h
                      nullable: true
                    previous_response_id:
                      type: string
                      nullable: true
                    model:
                      type: string
                      description: The model deployment to use for the creation of this response.
                    reasoning:
                      type: object
                      allOf:
                        - $ref: '#/components/schemas/OpenAI.Reasoning'
                      nullable: true
                    background:
                      type: boolean
                      nullable: true
                    max_output_tokens:
                      type: integer
                      nullable: true
                    max_tool_calls:
                      type: integer
                      nullable: true
                    text:
                      $ref: '#/components/schemas/OpenAI.ResponseTextParam'
                    tools:
                      $ref: '#/components/schemas/OpenAI.ToolsArray'
                    tool_choice:
                      oneOf:
                        - $ref: '#/components/schemas/OpenAI.ToolChoiceOptions'
                        - $ref: '#/components/schemas/OpenAI.ToolChoiceParam'
                    prompt:
                      $ref: '#/components/schemas/OpenAI.Prompt'
                    truncation:
                      type: string
                      enum:
                        - auto
                        - disabled
                      nullable: true
                      default: disabled
                    input:
                      $ref: '#/components/schemas/OpenAI.InputParam'
                    include:
                      type: array
                      items:
                        $ref: '#/components/schemas/OpenAI.IncludeEnum'
                      nullable: true
                    parallel_tool_calls:
                      type: boolean
                      nullable: true
                      default: true
                    store:
                      type: boolean
                      nullable: true
                      default: true
                    instructions:
                      type: string
                      nullable: true
                    stream:
                      type: boolean
                      nullable: true
                    stream_options:
                      type: object
                      allOf:
                        - $ref: '#/components/schemas/OpenAI.ResponseStreamOptions'
                      nullable: true
                    conversation:
                      allOf:
                        - $ref: '#/components/schemas/OpenAI.ConversationParam'
                      nullable: true
                    context_management:
                      type: array
                      items:
                        $ref: '#/components/schemas/OpenAI.ContextManagementParam'
                      nullable: true
                      description: Context management configuration for this request.
                    agent:
                      allOf:
                        - $ref: '#/components/schemas/AgentReference'
                      description: |-
                        (Deprecated) Use agent_reference instead.
                        The agent to use for generating the response.
                    agent_reference:
                      allOf:
                        - $ref: '#/components/schemas/AgentReference'
                      description: The agent to use for generating the response.
                    structured_inputs:
                      type: object
                      additionalProperties: {}
                      description: The structured inputs to the response that can participate in prompt template substitution or tool argument bindings.
                    agent_session_id:
                      type: string
                      description: |-
                        Optional session identifier for sandbox affinity. Currently only relevant for hosted agents.
                        When provided, the request is routed to the same sandbox. When omitted, auto-derived from
                        conversation_id/prev_response_id or a new UUID is generated.
    get:
      operationId: listResponses
      description: Returns the list of all responses.
      parameters:
        - name: limit
          in: query
          required: false
          description: |-
            A limit on the number of objects to be returned. Limit can range between 1 and 100, and the
            default is 20.
          schema:
            type: integer
            format: int32
            default: 20
          explode: false
        - name: order
          in: query
          required: false
          description: |-
            Sort order by the `created_at` timestamp of the objects. `asc` for ascending order and`desc`
            for descending order.
          schema:
            $ref: '#/components/schemas/PageOrder'
          explode: false
        - name: after
          in: query
          required: false
          description: |-
            A cursor for use in pagination. `after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 objects, ending with obj_foo, your
            subsequent call can include after=obj_foo in order to fetch the next page of the list.
          schema:
            type: string
          explode: false
        - name: before
          in: query
          required: false
          description: |-
            A cursor for use in pagination. `before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 objects, ending with obj_foo, your
            subsequent call can include before=obj_foo in order to fetch the previous page of the list.
          schema:
            type: string
          explode: false
        - name: agent_name
          in: query
          required: false
          description: Filter by agent name. If provided, only items associated with the specified agent will be returned.
          schema:
            type: string
          explode: false
        - name: agent_id
          in: query
          required: false
          description: Filter by agent ID in the format `name:version`. If provided, only items associated with the specified agent ID will be returned.
          schema:
            type: string
          explode: false
        - name: conversation_id
          in: query
          required: false
          description: Filter by conversation ID. If provided, only responses associated with the specified conversation will be returned.
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - has_more
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OpenAI.Response'
                    description: The requested list of items.
                  first_id:
                    type: string
                    description: The first ID represented in this list.
                  last_id:
                    type: string
                    description: The last ID represented in this list.
                  has_more:
                    type: boolean
                    description: A value indicating whether there are additional values available not captured in this list.
                description: The response data for a requested list of items.
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      tags:
        - Responses
  /openai/v1/responses/compact:
    post:
      operationId: compactResponseConversation
      description: Produces a compaction of a responses conversation.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAI.CompactResource'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      tags:
        - Responses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenAI.CompactResponseMethodPublicBody'
  /openai/v1/responses/{response_id}:
    get:
      operationId: getResponse_getResponseStream
      parameters:
        - name: response_id
          in: path
          required: true
          schema:
            type: string
        - name: include[]
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/OpenAI.IncludeEnum'
            default: []
        - name: stream
          in: query
          required: false
          schema:
            type: boolean
            default: false
          explode: false
        - name: starting_after
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
        - name: accept
          in: header
          required: false
          schema:
            type: string
            enum:
              - text/event-stream
      description: Retrieves a model response with the given ID. Retrieves a model response with the given ID (streaming response).
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAI.Response'
            text/event-stream:
              schema:
                $ref: '#/components/schemas/OpenAI.CreateResponseStreamingResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      tags:
        - Responses
    delete:
      operationId: deleteResponse
      description: Deletes a model response.
      parameters:
        - name: response_id
          in: path
          required: true
          description: The ID of the response to delete.
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponseResult'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      tags:
        - Responses
  /openai/v1/responses/{response_id}/cancel:
    post:
      operationId: cancelResponse
      description: Cancels a model response.
      parameters:
        - name: response_id
          in: path
          required: true
          description: The ID of the response to cancel.
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAI.Response'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      tags:
        - Responses
  /openai/v1/responses/{response_id}/input_items:
    get:
      operationId: listInputItems
      description: Returns a list of input items for a given response.
      parameters:
        - name: response_id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: |-
            A limit on the number of objects to be returned. Limit can range between 1 and 100, and the
            default is 20.
          schema:
            type: integer
            format: int32
            default: 20
          explode: false
        - name: order
          in: query
          required: false
          description: |-
            Sort order by the `created_at` timestamp of the objects. `asc` for ascending order and`desc`
            for descending order.
          schema:
            $ref: '#/components/schemas/PageOrder'
          explode: false
        - name: after
          in: query
          required: false
          description: |-
            A cursor for use in pagination. `after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 objects, ending with obj_foo, your
            subsequent call can include after=obj_foo in order to fetch the next page of the list.
          schema:
            type: string
          explode: false
        - name: before
          in: query
          required: false
          description: |-
            A cursor for use in pagination. `before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 objects, ending with obj_foo, your
            subsequent call can include before=obj_foo in order to fetch the previous page of the list.
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - has_more
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OpenAI.OutputItem'
                    description: The requested list of items.
                  first_id:
                    type: string
                    description: The first ID represented in this list.
                  last_id:
                    type: string
                    description: The last ID represented in this list.
                  has_more:
                    type: boolean
                    description: A value indicating whether there are additional values available not captured in this list.
                description: The response data for a requested list of items.
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      tags:
        - Responses
security:
  - OAuth2Auth:
      - https://ai.azure.com/.default
components:
  schemas:
    A2APreviewTool:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - a2a_preview
          description: The type of the tool. Always `"a2a_preview`.
        base_url:
          type: string
          format: uri
          description: Base URL of the agent.
        agent_card_path:
          type: string
          description: |-
            The path to the agent card relative to the `base_url`.
            If not provided, defaults to  `/.well-known/agent-card.json`
        project_connection_id:
          type: string
          description: |-
            The connection ID in the project for the A2A server.
            The connection stores authentication and other connection details needed to connect to the A2A server.
      allOf:
        - $ref: '#/components/schemas/OpenAI.Tool'
      description: An agent implementing the A2A protocol.
    A2AToolCall:
      type: object
      required:
        - type
        - call_id
        - name
        - arguments
        - status
      properties:
        type:
          type: string
          enum:
            - a2a_preview_call
        call_id:
          type: string
          description: The unique ID of the tool call generated by the model.
        name:
          type: string
          description: The name of the A2A agent card being called.
        arguments:
          type: string
          description: A JSON string of the arguments to pass to the tool.
        status:
          allOf:
            - $ref: '#/components/schemas/ToolCallStatus'
          description: The status of the tool call.
      allOf:
        - $ref: '#/components/schemas/OpenAI.OutputItem'
      description: An A2A (Agent-to-Agent) tool call.
    A2AToolCallOutput:
      type: object
      required:
        - type
        - call_id
        - name
        - status
      properties:
        type:
          type: string
          enum:
            - a2a_preview_call_output
        call_id:
          type: string
          description: The unique ID of the tool call generated by the model.
        name:
          type: string
          description: The name of the A2A agent card that was called.
        output:
          allOf:
            - $ref: '#/components/schemas/ToolCallOutputContent'
          description: The output from the A2A tool call.
        status:
          allOf:
            - $ref: '#/components/schemas/ToolCallStatus'
          description: The status of the tool call.
      allOf:
        - $ref: '#/components/schemas/OpenAI.OutputItem'
      description: The output of an A2A (Agent-to-Agent) tool call.
    AISearchIndexResource:
      type: object
      properties:
        project_connection_id:
          type: string
          description: An index connection ID in an IndexResource attached to this agent.
        index_name:
          type: string
          description: The name of an index in an IndexResource attached to this agent.
        query_type:
          allOf:
            - $ref: '#/components/schemas/AzureAISearchQueryType'
          description: Type of query in an AIIndexResource attached to this agent.
        top_k:
          type: integer
          format: int32
          description: Number of documents to retrieve from search and present to the model.
        filter:
          type: string
          description: filter string for search resource. [Learn more here](https://learn.microsoft.com/azure/search/search-filters).
        index_asset_id:
          type: string
          description: Index asset id for search resource.
      description: A AI Search Index resource.
    AgentDefinitionOptInKeys:
      anyOf:
        - type: string
        - type: string
          enum:
            - HostedAgents=V1Preview
            - WorkflowAgents=V1Preview
            - ContainerAgents=V1Preview
      description: Feature opt-in keys for agent definition operations supporting hosted or workflow agents.
    AgentId:
      type: object
      required:
        - type
        - name
        - version
      properties:
        type:
          type: string
          enum:
            - agent_id
        name:
          type: string
          maxLength: 256
          description: The name of the agent.
        version:
          type: string
          description: The version identifier of the agent.
    AgentReference:
      type: object
      required:
        - type
        - name
      properties:
        type:
          type: string
          enum:
            - agent_reference
        name:
          type: string
          maxLength: 256
          description: The name of the agent.
        version:
          type: string
          description: The version identifier of the agent.
    ApiErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/OpenAI.Error'
      description: Error response for API failures.
    AzureAISearchQueryType:
      anyOf:
        - type: string
        - type: string
          enum:
            - simple
            - semantic
            - vector
            - vector_simple_hybrid
            - vector_semantic_hybrid
      description: Available query types for Azure AI Search tool.
    AzureAISearchTool:
      type: object
      required:
        - type
        - azure_ai_search
      properties:
        type:
          type: string
          enum:
            - azure_ai_search
          description: The object type, which is always 'azure_ai_search'.
        azure_ai_search:
          allOf:
            - $ref: '#/components/schemas/AzureAISearchToolResource'
          description: The azure ai search index resource.
      allOf:
        - $ref: '#/components/schemas/OpenAI.Tool'
      description: The input definition information for an Azure AI search tool as used to configure an agent.
    AzureAISearchToolCall:
      type: object
      required:
        - type
        - call_id
        - arguments
        - status
      properties:
        type:
          type: string
          enum:
            - azure_ai_search_call
        call_id:
          type: string
          description: The unique ID of the tool call generated by the model.
        arguments:
          type: string
          description: A JSON string of the arguments to pass to the tool.
        status:
          allOf:
            - $ref: '#/components/schemas/ToolCallStatus'
          description: The status of the tool call.
      allOf:
        - $ref: '#/components/schemas/OpenAI.OutputItem'
      description: An Azure AI Search tool call.
    AzureAISearchToolCallOutput:
      type: object
      required:
        - type
        - call_id
        - status
      properties:
        type:
          type: string
          enum:
            - azure_ai_search_call_output
        call_id:
          type: string
          description: The unique ID of the tool call generated by the model.
        output:
          allOf:
            - $ref: '#/components/schemas/ToolCallOutputContent'
          description: The output from the Azure AI Search tool call.
        status:
          allOf:
            - $ref: '#/components/schemas/ToolCallStatus'
          description: The status of the tool call.
      allOf:
        - $ref: '#/components/schemas/OpenAI.OutputItem'
      description: The output of an Azure AI Search tool call.
    AzureAISearchToolResource:
      type: object
      required:
        - indexes
      properties:
        indexes:
          type: array
          items:
            $ref: '#/components/schemas/AISearchIndexResource'
          maxItems: 1
          description: |-
            The indices attached to this agent. There can be a maximum of 1 index
            resource attached to the agent.
      description: A set of index resources used by the `azure_ai_search` tool.
    AzureFunctionBinding:
      type: object
      required:
        - type
        - storage_queue
      properties:
        type:
          type: string
          enum:
            - storage_queue
          description: The type of binding, which is always 'storage_queue'.
        storage_queue:
          allOf:
            - $ref: '#/components/schemas/AzureFunctionStorageQueue'
          description: Storage queue.
      description: The structure for keeping storage queue name and URI.
    AzureFunctionDefinition:
      type: object
      required:
        - function
        - input_binding
        - output_binding
      properties:
        function:
          type: object
          properties:
            name:
              type: string
              description: The name of the function to be called.
            description:
              type: string
