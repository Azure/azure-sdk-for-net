kind: hosted
name: travel-agent-sample
protocols:
    - protocol: responses
      version: 1.0.0
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
    - name: AZURE_AI_OPENAI_ENDPOINT
      value: ${AZURE_AI_OPENAI_ENDPOINT}
    - name: OPTIMIZATION_LOCAL_DIR
      value: .agent_configs
    # After running `azd ai agent optimize`, set these on the deployed agent's
    # environment to enable the runtime resolver (Priority 1 in the loader):
    #
    #   - name: OPTIMIZATION_JOB_ID
    #     value: <your-optimization-job-id>
    #   - name: OPTIMIZATION_CANDIDATE_ID
    #     value: cand_<your-candidate-id>
    #   - name: OPTIMIZATION_RESOLVE_ENDPOINT
    #     value: <foundry-project-endpoint>
    #
    # Alternatively, `azd ai agent optimize apply --candidate <id>` writes the
    # config locally and sets OPTIMIZATION_CANDIDATE_ID — the loader then uses
    # the local directory path (Priority 3) instead of the remote API.

