# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
    - main
    - hotfix/*
    - release/*
  paths:
    include:
    - sdk/postgresql/ci.yml
    - sdk/postgresql/service.projects
    - sdk/postgresql/Microsoft.Azure.PostgreSQL.Auth

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    SDKType: client
    ServiceDirectory: postgresql
    ArtifactName: packages
    Artifacts:
    - name: Microsoft.Azure.PostgreSQL.Auth
      safeName: MicrosoftAzurePostgreSQLAuth